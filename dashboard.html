<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO-PM · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #081221;
    --surface: #0f1b2e;
    --surface2: #1d2839;
    --surface3: #263040;
    --border: #26344a;
    --border2: #3a4d66;
    --text: #f8fafc;
    --muted: #97a3b4;
    --accent: #00bfff;
    --accent-dim: rgba(0,191,255,0.12);
    --accent-dark: #081221;
    --accent2: #3b82f6;
    --accent2-dim: rgba(59,130,246,0.12);
    --accent3: #f59e0b;
    --accent3-dim: rgba(245,158,11,0.12);
    --danger: #ef4444;
    --success: #10b981;
    --r: 8px; --rl: 12px;
    --font: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 10% 0%, rgba(0,191,255,0.05) 0%, transparent 50%); pointer-events: none; z-index: 0; }

  /* NAV */
  nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2.5rem; background: rgba(15,27,46,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
  .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-user { font-size: 14px; color: var(--muted); }
  .nav-logout { font-size: 14px; color: var(--muted); background: none; border: 1px solid var(--border2); border-radius: var(--r); padding: 7px 16px; cursor: pointer; font-family: var(--font); transition: all 0.2s; font-weight: 500; }
  .nav-logout:hover { color: var(--accent); border-color: var(--accent); }

  main { max-width: 1280px; margin: 0 auto; padding: 2.5rem 2rem; position: relative; z-index: 1; }

  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
  h1 { font-size: 32px; font-weight: 700; }
  h1 span { color: var(--accent); }
  .page-date { font-size: 14px; color: var(--muted); }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 2.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.5rem; transition: border-color 0.2s; }
  .stat:hover { border-color: var(--border2); }
  .stat-val { font-size: 36px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 6px; }
  .stat-label { font-size: 15px; color: var(--muted); font-weight: 500; }

  /* TOOLBAR */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.75rem; flex-wrap: wrap; }
  .filter { padding: 9px 20px; border-radius: 6px; border: 1px solid var(--border2); font-size: 15px; cursor: pointer; background: transparent; color: var(--muted); font-family: var(--font); transition: all 0.15s; font-weight: 500; }
  .filter.active { background: var(--accent); color: var(--accent-dark); border-color: var(--accent); font-weight: 700; }
  .filter:hover:not(.active) { color: var(--accent); border-color: var(--accent); }
  .btn-add { margin-left: auto; padding: 9px 22px; background: var(--accent); color: var(--accent-dark); border: none; border-radius: 6px; font-family: var(--font); font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-add:hover { background: #1ad4ff; box-shadow: 0 4px 16px rgba(0,191,255,0.25); }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.5rem; display: flex; flex-direction: column; gap: 14px; transition: all 0.2s; cursor: pointer; }
  .card:hover { border-color: var(--accent); box-shadow: 0 4px 24px rgba(0,191,255,0.08); transform: translateY(-2px); }
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .card-name { font-size: 20px; font-weight: 700; }
  .badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 600; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.03em; }
  .badge-seo { background: var(--accent-dim); color: var(--accent); }
  .badge-own { background: var(--accent2-dim); color: var(--accent2); }
  .badge-startup { background: var(--accent3-dim); color: var(--accent3); }
  .card-cat { font-size: 15px; color: var(--muted); line-height: 1.5; }
  .card-meta { display: flex; gap: 16px; flex-wrap: wrap; }
  .meta { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; font-weight: 500; }
  .meta-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border2); }

  .divider { height: 1px; background: var(--border); }

  .sec-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
  .site-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
  .site-url { font-size: 13px; color: var(--accent); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-family: monospace; transition: opacity 0.15s; }
  .site-url:hover { opacity: 0.75; }
  .more-sites { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .kw-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .kw { font-size: 12px; padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-weight: 500; }

  .card-actions { display: flex; gap: 8px; margin-top: auto; }
  .btn-view { flex: 1; padding: 10px; background: var(--accent-dim); border: none; border-radius: var(--r); color: var(--accent); font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-view:hover { background: var(--accent); color: var(--accent-dark); }
  .btn-edit { padding: 10px 16px; background: transparent; border: 1px solid var(--border2); border-radius: var(--r); color: var(--muted); font-family: var(--font); font-size: 15px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .btn-edit:hover { color: var(--text); border-color: var(--text); }
  .btn-del { padding: 10px 16px; background: transparent; border: 1px solid var(--border); border-radius: var(--r); color: var(--muted); font-family: var(--font); font-size: 15px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .btn-del:hover { color: var(--danger); border-color: var(--danger); }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--rl); padding: 2.5rem; width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .modal h2 { font-size: 24px; font-weight: 700; margin-bottom: 1.75rem; }
  .fg { margin-bottom: 1.25rem; }
  .fg label { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; display: block; margin-bottom: 7px; }
  .fg input, .fg select, .fg textarea { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); font-family: var(--font); font-size: 15px; color: var(--text); outline: none; transition: border 0.2s, box-shadow 0.2s; }
  .fg textarea { font-size: 13px; resize: vertical; min-height: 90px; line-height: 1.7; font-family: monospace; }
  .fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,191,255,0.1); }
  .fg select option { background: var(--surface2); }
  .fg-hint { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 2rem; }
  .btn-save { flex: 1; padding: 13px; background: var(--accent); color: var(--accent-dark); border: none; border-radius: var(--r); font-family: var(--font); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-save:hover { background: #1ad4ff; box-shadow: 0 4px 16px rgba(0,191,255,0.25); }
  .btn-cancel { padding: 13px 22px; background: transparent; border: 1px solid var(--border2); border-radius: var(--r); color: var(--muted); font-family: var(--font); font-size: 16px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .btn-cancel:hover { color: var(--text); border-color: var(--text); }

  .loading { text-align: center; padding: 4rem; font-size: 16px; color: var(--muted); }
  .empty { text-align: center; padding: 4rem; color: var(--muted); font-size: 16px; }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    main { padding: 1.5rem 1rem; }
    nav { padding: 1rem; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><span class="nav-dot"></span>SEO-PM</div>
  <div class="nav-right">
    <span class="nav-user">Alicante, ES</span>
    <button class="nav-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<main>
  <div class="page-head">
    <h1>Project <span>Dashboard</span></h1>
    <div class="page-date" id="page-date"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s1">—</div><div class="stat-label">SEO clients</div></div>
    <div class="stat"><div class="stat-val" id="s2">—</div><div class="stat-label">Websites managed</div></div>
    <div class="stat"><div class="stat-val" id="s3">—</div><div class="stat-label">Keywords tracked</div></div>
    <div class="stat"><div class="stat-val" id="s4">—</div><div class="stat-label">Own projects</div></div>
  </div>

  <div class="toolbar">
    <button class="filter active" onclick="setFilter('all',this)">All</button>
    <button class="filter" onclick="setFilter('seo',this)">SEO Clients</button>
    <button class="filter" onclick="setFilter('own',this)">Own Projects</button>
    <button class="filter" onclick="setFilter('startup',this)">Startup</button>
    <button class="btn-add" onclick="openAdd()">+ Add project</button>
  </div>

  <div class="grid" id="grid"><div class="loading">Loading projects…</div></div>
</main>

<div class="overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add project</h2>
    <div class="fg"><label>Project name *</label><input id="f-name" placeholder="e.g. LIMOSTAR"></div>
    <div class="fg"><label>Type</label><select id="f-type"><option value="seo">SEO Client</option><option value="own">Own Project</option><option value="startup">Startup</option></select></div>
    <div class="fg"><label>Category / Description</label><input id="f-cat" placeholder="e.g. Transport privé Bruxelles"></div>
    <div class="fg"><label>Client name</label><input id="f-client" placeholder="e.g. Michael"></div>
    <div class="fg"><label>Location</label><input id="f-loc" placeholder="e.g. Brussels, Belgium"></div>
    <div class="fg"><label>Languages</label><input id="f-lang" placeholder="e.g. FR / NL / EN"></div>
    <div class="fg"><label>Websites</label><textarea id="f-sites" placeholder="https://example.com&#10;https://example2.com"></textarea><div class="fg-hint">One URL per line</div></div>
    <div class="fg"><label>Keywords</label><textarea id="f-kw" placeholder="keyword 1&#10;keyword 2"></textarea><div class="fg-hint">One keyword per line</div></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveProject()">Save project</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
if (sessionStorage.getItem('seopm_auth') !== 'true') location.href = 'index.html';
const { createClient } = supabase;
const db = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
let allProjects = [], allWebsites = [], allKeywords = [], currentFilter = 'all', editingId = null;

document.getElementById('page-date').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

async function loadData() {
  const [{ data: projects }, { data: websites }, { data: keywords }] = await Promise.all([
    db.from('projects').select('*').order('created_at'),
    db.from('websites').select('*'),
    db.from('keywords').select('*')
  ]);
  allProjects = projects || []; allWebsites = websites || []; allKeywords = keywords || [];
  updateStats(); renderGrid();
}

function updateStats() {
  document.getElementById('s1').textContent = allProjects.filter(p=>p.type==='seo').length;
  document.getElementById('s2').textContent = allWebsites.length;
  document.getElementById('s3').textContent = allKeywords.length + '+';
  document.getElementById('s4').textContent = allProjects.filter(p=>p.type!=='seo').length;
}

function badgeClass(t) { return 'badge badge-'+t; }
function badgeLabel(t) { return t==='seo'?'SEO Client':t==='own'?'Own Project':'Startup'; }

function renderGrid() {
  const filtered = currentFilter==='all' ? allProjects : allProjects.filter(p=>p.type===currentFilter);
  const grid = document.getElementById('grid');
  if (!filtered.length) { grid.innerHTML='<div class="empty">No projects found.</div>'; return; }
  grid.innerHTML = filtered.map(p => {
    const sites = allWebsites.filter(w=>w.project_id===p.id);
    const kws = allKeywords.filter(k=>k.project_id===p.id);
    const sitesHtml = sites.slice(0,3).map(s=>`<div class="site-row"><a class="site-url" href="${s.url}" target="_blank" onclick="event.stopPropagation()">${s.url.replace(/https?:\/\//,'').replace(/\/$/,'')}</a></div>`).join('');
    const moreCount = sites.length - 3;
    const kwHtml = kws.slice(0,4).map(k=>`<span class="kw">${k.keyword}</span>`).join('');
    const kwMore = kws.length>4 ? `<span class="kw">+${kws.length-4} more</span>` : '';
    return `<div class="card" onclick="goProject('${p.id}')">
      <div class="card-head"><div class="card-name">${p.name}</div><span class="${badgeClass(p.type)}">${badgeLabel(p.type)}</span></div>
      <div class="card-cat">${p.category||''}</div>
      <div class="card-meta">
        ${p.location?`<span class="meta"><span class="meta-dot"></span>${p.location}</span>`:''}
        ${p.lang?`<span class="meta"><span class="meta-dot"></span>${p.lang}</span>`:''}
        ${p.client_name?`<span class="meta"><span class="meta-dot"></span>${p.client_name}</span>`:''}
      </div>
      ${sites.length>0?`<div class="divider"></div><div><div class="sec-label">Websites (${sites.length})</div>${sitesHtml}${moreCount>0?`<div class="more-sites">+${moreCount} more sites</div>`:''}</div>`:''}
      ${kws.length>0?`<div class="divider"></div><div><div class="sec-label">Keywords (${kws.length})</div><div class="kw-tags">${kwHtml}${kwMore}</div></div>`:''}
      <div class="divider"></div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn-view" onclick="goProject('${p.id}')">View project →</button>
        <button class="btn-edit" onclick="openEdit('${p.id}')">Edit</button>
        <button class="btn-del" onclick="deleteProject('${p.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function goProject(id) { location.href = `project.html?id=${id}`; }

function setFilter(type, el) {
  currentFilter = type;
  document.querySelectorAll('.filter').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); renderGrid();
}

function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add project';
  ['f-name','f-cat','f-client','f-loc','f-lang','f-sites','f-kw'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-type').value = 'seo';
  document.getElementById('modal').classList.add('open');
}

async function openEdit(id) {
  event.stopPropagation(); editingId = id;
  const p = allProjects.find(x=>x.id===id); if(!p) return;
  document.getElementById('modal-title').textContent = 'Edit — ' + p.name;
  document.getElementById('f-name').value = p.name||'';
  document.getElementById('f-type').value = p.type||'seo';
  document.getElementById('f-cat').value = p.category||'';
  document.getElementById('f-client').value = p.client_name||'';
  document.getElementById('f-loc').value = p.location||'';
  document.getElementById('f-lang').value = p.lang||'';
  document.getElementById('f-sites').value = allWebsites.filter(w=>w.project_id===id).map(w=>w.url).join('\n');
  document.getElementById('f-kw').value = allKeywords.filter(k=>k.project_id===id).map(k=>k.keyword).join('\n');
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); editingId = null; }

async function saveProject() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Project name is required.'); return; }
  const data = { name, type: document.getElementById('f-type').value, category: document.getElementById('f-cat').value.trim(), client_name: document.getElementById('f-client').value.trim(), location: document.getElementById('f-loc').value.trim(), lang: document.getElementById('f-lang').value.trim(), updated_at: new Date().toISOString() };
  const sites = document.getElementById('f-sites').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const kws = document.getElementById('f-kw').value.split('\n').map(s=>s.trim()).filter(Boolean);
  let projectId = editingId;
  if (editingId) {
    await db.from('projects').update(data).eq('id', editingId);
    await db.from('websites').delete().eq('project_id', editingId);
    await db.from('keywords').delete().eq('project_id', editingId);
  } else {
    const { data: newP } = await db.from('projects').insert(data).select().single();
    projectId = newP.id;
  }
  if (sites.length) await db.from('websites').insert(sites.map((url,i)=>({ project_id: projectId, url, is_main: i===0 })));
  if (kws.length) await db.from('keywords').insert(kws.map(keyword=>({ project_id: projectId, keyword })));
  closeModal(); await loadData();
}

async function deleteProject(id) {
  event.stopPropagation();
  if (!confirm('Delete this project and all its data?')) return;
  await db.from('projects').delete().eq('id', id);
  await loadData();
}

function logout() { sessionStorage.removeItem('seopm_auth'); location.href='index.html'; }
document.getElementById('modal').addEventListener('click', function(e){if(e.target===this)closeModal();});
loadData();
</script>
</body>
</html>
