<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO-PM · Project</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #081221; --surface: #0f1b2e; --surface2: #1d2839; --surface3: #263040;
    --border: #26344a; --border2: #3a4d66;
    --text: #f8fafc; --muted: #97a3b4;
    --accent: #00bfff; --accent-dim: rgba(0,191,255,0.12); --accent-dark: #081221;
    --accent2: #3b82f6; --accent2-dim: rgba(59,130,246,0.12);
    --accent3: #f59e0b; --accent3-dim: rgba(245,158,11,0.12);
    --danger: #ef4444; --warn: #f59e0b; --warn-dim: rgba(245,158,11,0.1);
    --success: #10b981; --success-dim: rgba(16,185,129,0.12);
    --r: 8px; --rl: 12px; --font: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 10% 0%, rgba(0,191,255,0.04) 0%, transparent 50%); pointer-events: none; z-index: 0; }

  nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2.5rem; background: rgba(15,27,46,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
  .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .nav-back { font-size: 14px; color: var(--muted); background: none; border: 1px solid var(--border2); border-radius: var(--r); padding: 7px 16px; cursor: pointer; font-family: var(--font); transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; }
  .nav-back:hover { color: var(--accent); border-color: var(--accent); }
  .nav-logout { font-size: 14px; color: var(--muted); background: none; border: 1px solid var(--border2); border-radius: var(--r); padding: 7px 16px; cursor: pointer; font-family: var(--font); transition: all 0.2s; font-weight: 500; }
  .nav-logout:hover { color: var(--accent); border-color: var(--accent); }

  main { max-width: 1280px; margin: 0 auto; padding: 2.5rem 2rem; position: relative; z-index: 1; }

  .proj-head { margin-bottom: 2.5rem; }
  .proj-badges { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 600; letter-spacing: 0.03em; }
  .badge-seo { background: var(--accent-dim); color: var(--accent); }
  .badge-own { background: var(--accent2-dim); color: var(--accent2); }
  .badge-startup { background: var(--accent3-dim); color: var(--accent3); }
  .badge-loc { background: var(--surface2); color: var(--muted); }
  h1 { font-size: 38px; font-weight: 700; line-height: 1.15; margin-bottom: 0.5rem; }
  h1 span { color: var(--accent); }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; overflow-x: auto; }
  .tab { padding: 13px 22px; font-size: 15px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; font-family: var(--font); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
  h2 { font-size: 22px; font-weight: 700; }
  .btn-sm { padding: 9px 18px; background: var(--accent); color: var(--accent-dark); border: none; border-radius: 6px; font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-sm:hover { background: #1ad4ff; }
  .btn-sm-outline { padding: 9px 18px; background: transparent; color: var(--muted); border: 1px solid var(--border2); border-radius: 6px; font-family: var(--font); font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .btn-sm-outline:hover { color: var(--accent); border-color: var(--accent); }

  .card-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; }

  .sites-table { width: 100%; border-collapse: collapse; }
  .sites-table th { font-size: 12px; color: var(--muted); text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
  .sites-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 15px; vertical-align: middle; }
  .sites-table tr:last-child td { border-bottom: none; }
  .sites-table tr:hover td { background: var(--surface2); }
  .tbl-url { font-size: 13px; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 7px; font-family: monospace; transition: opacity 0.15s; }
  .tbl-url:hover { opacity: 0.75; }
  .main-badge { font-size: 10px; background: var(--accent-dim); color: var(--accent); padding: 2px 8px; border-radius: 10px; flex-shrink: 0; font-weight: 600; }
  .status-pill { font-size: 12px; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; font-weight: 600; }
  .status-pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .status-up { background: var(--success-dim); color: var(--success); }
  .status-down { background: rgba(239,68,68,0.12); color: var(--danger); }
  .status-unknown { background: var(--surface2); color: var(--muted); }
  .score-bar { display: flex; align-items: center; gap: 8px; }
  .score-num { font-size: 14px; font-weight: 600; min-width: 30px; font-family: monospace; }
  .score-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; max-width: 80px; }
  .score-fill { height: 100%; border-radius: 3px; }
  .score-good { background: var(--success); }
  .score-warn { background: var(--warn); }
  .score-bad { background: var(--danger); }
  .tbl-actions { display: flex; gap: 6px; }
  .tbl-btn { padding: 6px 12px; font-size: 12px; font-family: var(--font); border-radius: 6px; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-weight: 500; }
  .tbl-btn:hover { color: var(--text); border-color: var(--text); }
  .tbl-btn-del:hover { color: var(--danger); border-color: var(--danger); }
  .tbl-btn-check { background: var(--accent-dim); color: var(--accent); border-color: transparent; }
  .tbl-btn-check:hover { background: var(--accent); color: var(--accent-dark); }

  .kw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .kw-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 10px; transition: border-color 0.15s; }
  .kw-card:hover { border-color: var(--border2); }
  .kw-text { font-size: 15px; flex: 1; font-weight: 500; }
  .kw-lang { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: var(--surface2); color: var(--muted); font-weight: 600; letter-spacing: 0.05em; }
  .kw-del { font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.15s; font-family: var(--font); }
  .kw-del:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

  .gsc-connect { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 3rem; text-align: center; }
  .gsc-icon { font-size: 44px; margin-bottom: 1rem; }
  .gsc-title { font-size: 24px; font-weight: 700; margin-bottom: 0.75rem; }
  .gsc-sub { font-size: 16px; color: var(--muted); margin-bottom: 2rem; line-height: 1.6; }
  .gsc-steps { text-align: left; background: var(--surface2); border-radius: var(--r); padding: 1.5rem; margin-bottom: 2rem; }
  .gsc-step { font-size: 14px; color: var(--muted); margin-bottom: 8px; display: flex; gap: 10px; }
  .gsc-step span { color: var(--accent); font-weight: 700; }
  .btn-gsc { padding: 14px 32px; background: var(--accent); color: var(--accent-dark); border: none; border-radius: var(--r); font-family: var(--font); font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-gsc:hover { background: #1ad4ff; box-shadow: 0 4px 20px rgba(0,191,255,0.3); }
  .gsc-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .gsc-status { margin-bottom: 1rem; font-size: 14px; color: var(--muted); }
  .gsc-err { margin-bottom: 1rem; color: var(--danger); font-size: 14px; }
  .gsc-table { width: 100%; border-collapse: collapse; }
  .gsc-table th { font-size: 12px; color: var(--muted); text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
  .gsc-table th.num { text-align: right; }
  .gsc-table td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 15px; }
  .gsc-table td.num { text-align: right; font-family: monospace; font-size: 14px; }
  .gsc-table tr:last-child td { border-bottom: none; }
  .gsc-table tr:hover td { background: var(--surface2); }
  .pos-chip { font-size: 13px; padding: 4px 10px; border-radius: 20px; display: inline-block; font-weight: 600; font-family: monospace; }
  .pos-top3 { background: var(--success-dim); color: var(--success); }
  .pos-top10 { background: var(--warn-dim); color: var(--warn); }
  .pos-other { background: var(--surface2); color: var(--muted); }

  .add-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .add-row input, .add-row select { flex: 1; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r); font-family: var(--font); font-size: 15px; color: var(--text); outline: none; transition: border 0.2s, box-shadow 0.2s; }
  .add-row input:focus, .add-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,191,255,0.1); }
  .add-row button { padding: 11px 20px; background: var(--accent); color: var(--accent-dark); border: none; border-radius: var(--r); font-family: var(--font); font-size: 15px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .add-row button:hover { background: #1ad4ff; }

  .info-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.5rem; margin-bottom: 1.5rem; }
  .info-box .info-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .info-box .info-text { font-size: 15px; color: var(--muted); line-height: 1.6; }
  .info-box a { color: var(--accent); }

  .loading { text-align: center; padding: 4rem; font-size: 16px; color: var(--muted); }
  .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 16px; }

  @media (max-width: 768px) {
    main { padding: 1.5rem 1rem; }
    nav { padding: 1rem; }
    h1 { font-size: 26px; }
    .sites-table th:nth-child(3), .sites-table td:nth-child(3),
    .sites-table th:nth-child(4), .sites-table td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><span class="nav-dot"></span>SEO-PM</div>
  <div class="nav-right">
    <a class="nav-back" href="dashboard.html">← Dashboard</a>
    <button class="nav-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<main id="main-content"><div class="loading">Loading project…</div></main>

<script src="config.js"></script>
<script>
if (sessionStorage.getItem('seopm_auth') !== 'true') location.href = 'index.html';
const { createClient } = supabase;
const db = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
const params = new URLSearchParams(location.search);
const projectId = params.get('id');
if (!projectId) location.href = 'dashboard.html';
let project = null, sites = [], keywords = [], gscData = [], pagespeedData = [], activeTab = 'sites';
let gscToken = null, gscApiRows = [], gscLoading = false, gscError = '', gscBootstrapped = false;
const GSC_REDIRECT_URI = 'https://app.crmterra.com/';
const GSC_SITE_URL = 'https://limostar.com/';

async function loadAll() {
  const [{ data: p }, { data: w }, { data: k }, { data: g }, { data: ps }] = await Promise.all([
    db.from('projects').select('*').eq('id', projectId).single(),
    db.from('websites').select('*').eq('project_id', projectId).order('is_main', { ascending: false }),
    db.from('keywords').select('*').eq('project_id', projectId).order('lang'),
    db.from('gsc_data').select('*').eq('project_id', projectId).order('date', { ascending: false }),
    db.from('pagespeed_data').select('*').order('checked_at', { ascending: false })
  ]);
  project = p; sites = w||[]; keywords = k||[]; gscData = g||[]; pagespeedData = ps||[];
  renderPage();
  if (gscToken && !gscBootstrapped) {
    gscBootstrapped = true;
    await fetchGSCData(gscToken);
  }
}

function badgeClass(t) { return 'badge badge-'+t; }
function badgeLabel(t) { return t==='seo'?'SEO Client':t==='own'?'Own Project':'Startup'; }

function renderPage() {
  document.title = `SEO-PM · ${project.name}`;
  document.getElementById('main-content').innerHTML = `
    <div class="proj-head">
      <div class="proj-badges">
        <span class="${badgeClass(project.type)}">${badgeLabel(project.type)}</span>
        ${project.location?`<span class="badge badge-loc">${project.location}</span>`:''}
        ${project.lang?`<span class="badge badge-loc">${project.lang}</span>`:''}
        ${project.client_name?`<span class="badge badge-loc">Client: ${project.client_name}</span>`:''}
      </div>
      <h1>${project.name} <span>${project.category||''}</span></h1>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('sites',this)">Websites (${sites.length})</button>
      <button class="tab" onclick="switchTab('keywords',this)">Keywords (${keywords.length})</button>
      <button class="tab" onclick="switchTab('pagespeed',this)">PageSpeed</button>
      <button class="tab" onclick="switchTab('gsc',this)">Search Console</button>
    </div>
    <div id="tab-sites" class="tab-content active">${renderSites()}</div>
    <div id="tab-keywords" class="tab-content">${renderKeywords()}</div>
    <div id="tab-pagespeed" class="tab-content">${renderPagespeed()}</div>
    <div id="tab-gsc" class="tab-content">${renderGSC()}</div>
  `;
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function renderSites() {
  return `<div class="section-head"><h2>Websites</h2><button class="btn-sm" onclick="checkAllUptime()">Check all uptime</button></div>
  <div class="add-row">
    <input id="new-site-url" placeholder="https://example.com" onkeydown="if(event.key==='Enter')addSite()">
    <button onclick="addSite()">+ Add site</button>
  </div>
  <div class="card-wrap">
    <table class="sites-table">
      <thead><tr><th>URL</th><th>Status</th><th>PageSpeed</th><th>Last checked</th><th>Actions</th></tr></thead>
      <tbody>${sites.length ? sites.map(s => {
        const ps = pagespeedData.find(p=>p.website_id===s.id);
        const score = ps ? ps.performance_score : null;
        const sc = score===null?'':score>=90?'score-good':score>=50?'score-warn':'score-bad';
        const scoreHtml = score!==null?`<div class="score-bar"><span class="score-num">${score}</span><div class="score-track"><div class="score-fill ${sc}" style="width:${score}%"></div></div></div>`:`<span style="color:var(--muted);font-size:14px">—</span>`;
        const label = s.url.replace(/https?:\/\//,'').replace(/\/$/,'');
        return `<tr><td><a class="tbl-url" href="${s.url}" target="_blank">${label}${s.is_main?'<span class="main-badge">main</span>':''}</a></td>
          <td><span class="status-pill status-unknown" id="status-${s.id}">unknown</span></td>
          <td>${scoreHtml}</td>
          <td style="font-size:13px;color:var(--muted)">${ps?new Date(ps.checked_at).toLocaleDateString('en-GB'):'—'}</td>
          <td><div class="tbl-actions">
            <button class="tbl-btn tbl-btn-check" onclick="checkSite('${s.id}','${s.url}')">Check</button>
            <button class="tbl-btn tbl-btn-check" onclick="runPagespeed('${s.id}','${s.url}')">PSI</button>
            <button class="tbl-btn tbl-btn-del" onclick="deleteSite('${s.id}')">Del</button>
          </div></td></tr>`;
      }).join(''):`<tr><td colspan="5" style="text-align:center;padding:2.5rem;color:var(--muted)">No websites yet. Add one above.</td></tr>`}</tbody>
    </table>
  </div>`;
}

function renderKeywords() {
  return `<div class="section-head"><h2>Keywords</h2><span style="font-size:15px;color:var(--muted)">${keywords.length} total</span></div>
  <div class="add-row">
    <input id="new-kw" placeholder="e.g. location autocar Bruxelles" onkeydown="if(event.key==='Enter')addKeyword()">
    <select id="new-kw-lang"><option value="FR">FR</option><option value="EN">EN</option><option value="NL">NL</option><option value="AR">AR</option></select>
    <button onclick="addKeyword()">+ Add keyword</button>
  </div>
  <div class="kw-grid">${keywords.length?keywords.map(k=>`
    <div class="kw-card">
      <span class="kw-text">${k.keyword}</span>
      <span class="kw-lang">${k.lang||'—'}</span>
      <button class="kw-del" onclick="deleteKeyword('${k.id}')">✕</button>
    </div>`).join(''):`<div class="empty">No keywords yet.</div>`}</div>`;
}

function renderPagespeed() {
  return `<div class="section-head"><h2>PageSpeed Insights</h2><button class="btn-sm" onclick="runAllPagespeed()">Run all sites</button></div>
  <div class="info-box"><div class="info-label">API Key required</div><div class="info-text">Add PSI_API_KEY to config.js — get it free at <a href="https://developers.google.com/speed/docs/insights/v5/get-started" target="_blank">Google Developers Console</a>.</div></div>
  <div class="card-wrap"><table class="sites-table">
    <thead><tr><th>Website</th><th>Score</th><th>LCP</th><th>CLS</th><th>Device</th><th>Checked</th></tr></thead>
    <tbody>${sites.map(s=>{
      const ps = pagespeedData.filter(p=>p.website_id===s.id);
      if(!ps.length) return `<tr><td style="font-size:13px;color:var(--accent);font-family:monospace">${s.url.replace(/https?:\/\//,'').replace(/\/$/,'')}</td><td colspan="5" style="color:var(--muted);font-size:14px">Not checked yet — click PSI in Websites tab</td></tr>`;
      return ps.map(p=>`<tr>
        <td style="font-size:13px;color:var(--accent);font-family:monospace">${s.url.replace(/https?:\/\//,'').replace(/\/$/,'')}</td>
        <td><div class="score-bar"><span class="score-num">${p.performance_score||'—'}</span><div class="score-track"><div class="score-fill ${p.performance_score>=90?'score-good':p.performance_score>=50?'score-warn':'score-bad'}" style="width:${p.performance_score||0}%"></div></div></div></td>
        <td style="font-size:14px">${p.lcp?p.lcp+'s':'—'}</td>
        <td style="font-size:14px">${p.cls!==null?p.cls:'—'}</td>
        <td><span class="kw-lang">${p.device||'—'}</span></td>
        <td style="font-size:13px;color:var(--muted)">${new Date(p.checked_at).toLocaleDateString('en-GB')}</td>
      </tr>`).join('');
    }).join('')}</tbody>
  </table></div>`;
}

function renderGSC() {
  if (!gscToken) return `<div class="gsc-connect">
    <div class="gsc-icon">📊</div>
    <div class="gsc-title">Connect Google Search Console</div>
    <div class="gsc-sub">Connect your Google account and pull live Search Console data for <strong>${project.name}</strong>.</div>
    <div class="gsc-steps">
      <div class="gsc-step"><span>01</span> Go to Google Cloud Console → Create OAuth 2.0 Client ID</div>
      <div class="gsc-step"><span>02</span> Enable Search Console API for your project</div>
      <div class="gsc-step"><span>03</span> Set redirect URI to https://app.crmterra.com/</div>
      <div class="gsc-step"><span>04</span> Click Connect and approve access</div>
    </div>
    <button class="btn-gsc" onclick="connectGSC()">Connect Google Search Console →</button>
  </div>`;
  const rows = gscApiRows;
  const status = gscLoading ? 'Loading Search Console data...' : `Connected to ${GSC_SITE_URL}`;
  const errorHtml = gscError ? `<div class="gsc-err">${gscError}</div>` : '';
  if (!rows.length && !gscLoading) {
    return `<div class="section-head"><h2>Search Console Data</h2>
      <div class="gsc-actions"><button class="btn-sm-outline" onclick="disconnectGSC()">Disconnect</button><button class="btn-sm" onclick="syncGSC()">Sync now</button></div>
    </div>
    ${errorHtml}
    <div class="gsc-status">${status}</div>
    <div class="empty">No Search Console rows returned yet. Click Sync now.</div>`;
  }
  return `<div class="section-head"><h2>Search Console Data</h2>
    <div class="gsc-actions"><button class="btn-sm-outline" onclick="disconnectGSC()">Disconnect</button><button class="btn-sm" onclick="syncGSC()">Sync now</button></div>
  </div>
  ${errorHtml}
  <div class="gsc-status">${status}</div>
  <div class="card-wrap"><table class="gsc-table">
    <thead><tr><th>Keyword</th><th>Website</th><th class="num">Position</th><th class="num">Clicks</th><th class="num">Impressions</th><th class="num">CTR</th></tr></thead>
    <tbody>${rows.slice(0,50).map(row=>{
      const pos = parseFloat(row.position);
      const cls = pos<=3?'pos-top3':pos<=10?'pos-top10':'pos-other';
      return `<tr><td>${row.keyword}</td><td style="font-size:13px;color:var(--muted);font-family:monospace">${row.website_url.replace(/https?:\/\//,'').replace(/\/$/,'')}</td>
        <td class="num"><span class="pos-chip ${cls}">#${pos.toFixed(1)}</span></td>
        <td class="num">${row.clicks}</td><td class="num">${row.impressions}</td><td class="num">${row.ctr}%</td></tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

async function addSite() {
  const url = document.getElementById('new-site-url').value.trim();
  if (!url || !url.startsWith('http')) { alert('Please enter a valid URL starting with https://'); return; }
  await db.from('websites').insert({ project_id: projectId, url, is_main: sites.length===0 });
  await loadAll();
}
async function deleteSite(id) {
  if (!confirm('Remove this website?')) return;
  await db.from('websites').delete().eq('id', id); await loadAll();
}
async function addKeyword() {
  const keyword = document.getElementById('new-kw').value.trim();
  const lang = document.getElementById('new-kw-lang').value;
  if (!keyword) return;
  await db.from('keywords').insert({ project_id: projectId, keyword, lang });
  document.getElementById('new-kw').value = ''; await loadAll();
}
async function deleteKeyword(id) {
  await db.from('keywords').delete().eq('id', id); await loadAll();
}
async function checkSite(siteId, url) {
  const el = document.getElementById('status-'+siteId);
  if (el) { el.className='status-pill status-unknown'; el.textContent='checking…'; }
  try {
    const start = Date.now();
    await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
    const ms = Date.now() - start;
    await db.from('uptime_logs').insert({ website_id: siteId, status: 'up', response_time_ms: ms });
    if (el) { el.className='status-pill status-up'; el.textContent='online'; }
  } catch {
    await db.from('uptime_logs').insert({ website_id: siteId, status: 'down' });
    if (el) { el.className='status-pill status-down'; el.textContent='offline'; }
  }
}
async function checkAllUptime() { for (const s of sites) await checkSite(s.id, s.url); }
async function runPagespeed(siteId, url) {
  if (!CONFIG.PSI_API_KEY || CONFIG.PSI_API_KEY === 'YOUR_PSI_API_KEY') {
    alert('Add your PSI_API_KEY to config.js first.'); return;
  }
  try {
    const r = await fetch(`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&key=${CONFIG.PSI_API_KEY}&strategy=mobile`);
    const data = await r.json();
    const cats = data.lighthouseResult?.categories;
    const audits = data.lighthouseResult?.audits;
    if (cats) {
      await db.from('pagespeed_data').insert({ website_id: siteId, performance_score: Math.round((cats.performance?.score||0)*100), lcp: audits?.['largest-contentful-paint']?.numericValue?(audits['largest-contentful-paint'].numericValue/1000).toFixed(2):null, cls: audits?.['cumulative-layout-shift']?.numericValue?.toFixed(3)||null, fid: audits?.['total-blocking-time']?.numericValue?.toFixed(0)||null, ttfb: audits?.['server-response-time']?.numericValue?(audits['server-response-time'].numericValue/1000).toFixed(2):null, device: 'mobile' });
      await loadAll();
    }
  } catch(e) { alert('PageSpeed check failed: ' + e.message); }
}
async function runAllPagespeed() { for (const s of sites) await runPagespeed(s.id, s.url); }
function connectGSC() {
  if (!CONFIG.GSC_CLIENT_ID || CONFIG.GSC_CLIENT_ID==='YOUR_GSC_CLIENT_ID') {
    alert('Add your GSC_CLIENT_ID to config.js first.'); return;
  }
  const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth'
    + `?client_id=${encodeURIComponent(CONFIG.GSC_CLIENT_ID)}`
    + `&redirect_uri=${encodeURIComponent(GSC_REDIRECT_URI)}`
    + '&response_type=token'
    + `&scope=${encodeURIComponent('https://www.googleapis.com/auth/webmasters.readonly')}`
    + '&include_granted_scopes=true'
    + '&prompt=consent';
  location.href = authUrl;
}
function getHashParams() {
  return new URLSearchParams((location.hash || '').replace(/^#/, ''));
}
function refreshGSCTab() {
  const tab = document.getElementById('tab-gsc');
  if (tab) tab.innerHTML = renderGSC();
}
function hydrateGSCAuth() {
  const hash = getHashParams();
  const tokenFromHash = hash.get('access_token');
  if (tokenFromHash) {
    localStorage.setItem('gsc_token', tokenFromHash);
    history.replaceState(null, '', location.pathname + location.search);
  }
  gscToken = localStorage.getItem('gsc_token');
}
async function fetchGSCData(token) {
  gscLoading = true;
  gscError = '';
  refreshGSCTab();
  try {
    const response = await fetch(`https://www.googleapis.com/webmasters/v3/sites/${encodeURIComponent(GSC_SITE_URL)}/searchAnalytics/query`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        startDate: new Date(Date.now() - 28 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10),
        endDate: new Date().toISOString().slice(0, 10),
        dimensions: ['query'],
        rowLimit: 50
      })
    });
    const payload = await response.json();
    if (!response.ok) {
      if (response.status === 401 || response.status === 403) {
        localStorage.removeItem('gsc_token');
        gscToken = null;
      }
      throw new Error(payload?.error?.message || 'GSC API request failed');
    }
    gscApiRows = (payload.rows || []).map((row) => ({
      keyword: row.keys?.[0] || '',
      website_url: GSC_SITE_URL,
      position: Number((row.position || 0).toFixed(1)),
      clicks: row.clicks || 0,
      impressions: row.impressions || 0,
      ctr: ((row.ctr || 0) * 100).toFixed(2)
    }));
  } catch (err) {
    gscError = `Search Console sync failed: ${err.message}`;
  } finally {
    gscLoading = false;
    refreshGSCTab();
  }
}
async function syncGSC() {
  if (!gscToken) return;
  await fetchGSCData(gscToken);
}
function disconnectGSC() {
  localStorage.removeItem('gsc_token');
  gscToken = null;
  gscApiRows = [];
  gscError = '';
  refreshGSCTab();
}
function logout() { sessionStorage.removeItem('seopm_auth'); location.href='index.html'; }
hydrateGSCAuth();
loadAll();
</script>
