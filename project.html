<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO-PM · Project</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #f5f2eb; --surface: #ffffff; --surface2: #f0ece3;
    --border: #e0dbd0; --border2: #c8c2b4;
    --text: #1a1814; --muted: #7a7468;
    --accent: #1a5c3a; --accent-light: #e8f2ec;
    --accent2: #1a3a5c; --accent2-light: #e8ecf2;
    --accent3: #5c3a1a; --accent3-light: #f2ece8;
    --danger: #c0392b; --warn: #c07a1a; --warn-light: #fef3e2;
    --success: #1a5c3a; --success-light: #e8f2ec;
    --font: 'Fraunces', serif; --mono: 'DM Mono', monospace;
    --r: 12px; --rl: 18px;
    --fs-base: 16px; --fs-sm: 14px; --fs-xs: 13px; --fs-label: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: var(--fs-base); }

  nav { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 2.5rem; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-family: var(--mono); font-size: 13px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
  .nav-logo::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .nav-back { font-family: var(--mono); font-size: var(--fs-label); color: var(--muted); background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 5px 12px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
  .nav-back:hover { color: var(--text); border-color: var(--text); }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .nav-logout { font-family: var(--mono); font-size: var(--fs-label); color: var(--muted); background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 5px 12px; cursor: pointer; transition: all 0.2s; }
  .nav-logout:hover { color: var(--text); }

  main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem; }

  .proj-head { margin-bottom: 2.5rem; }
  .proj-badges { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .badge { font-family: var(--mono); font-size: 11px; padding: 4px 10px; border-radius: 20px; }
  .badge-seo { background: var(--accent-light); color: var(--accent); }
  .badge-own { background: var(--accent2-light); color: var(--accent2); }
  .badge-startup { background: var(--accent3-light); color: var(--accent3); }
  .badge-loc { background: var(--surface2); color: var(--muted); }
  h1 { font-size: 40px; font-weight: 300; line-height: 1.1; margin-bottom: 0.5rem; }
  h1 em { font-style: italic; font-weight: 600; color: var(--accent); }
  .proj-cat { font-size: var(--fs-sm); color: var(--muted); }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; overflow-x: auto; }
  .tab { padding: 12px 20px; font-family: var(--mono); font-size: var(--fs-label); color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* SECTION STYLES */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
  h2 { font-size: 22px; font-weight: 600; }
  .btn-sm { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 30px; font-family: var(--font); font-size: var(--fs-label); font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-sm:hover { background: #144d30; }
  .btn-sm-outline { padding: 8px 16px; background: transparent; color: var(--muted); border: 1px solid var(--border2); border-radius: 30px; font-family: var(--font); font-size: var(--fs-label); cursor: pointer; transition: all 0.2s; }
  .btn-sm-outline:hover { color: var(--text); border-color: var(--text); }

  /* WEBSITES TABLE */
  .sites-table { width: 100%; border-collapse: collapse; }
  .sites-table th { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); letter-spacing: 0.08em; text-transform: uppercase; }
  .sites-table td { padding: 13px 14px; border-bottom: 1px solid var(--border); font-size: var(--fs-sm); vertical-align: middle; }
  .sites-table tr:last-child td { border-bottom: none; }
  .sites-table tr:hover td { background: var(--surface2); }
  .tbl-url { font-family: var(--mono); font-size: var(--fs-label); color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 6px; }
  .tbl-url:hover { opacity: 0.75; }
  .main-badge { font-family: var(--mono); font-size: 10px; background: var(--accent-light); color: var(--accent); padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
  .status-pill { font-family: var(--mono); font-size: 11px; padding: 3px 9px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; }
  .status-pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .status-up { background: var(--success-light); color: var(--success); }
  .status-down { background: #fde8e8; color: var(--danger); }
  .status-unknown { background: var(--surface2); color: var(--muted); }
  .score-bar { display: flex; align-items: center; gap: 8px; }
  .score-num { font-family: var(--mono); font-size: var(--fs-label); font-weight: 500; min-width: 28px; }
  .score-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; max-width: 80px; }
  .score-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .score-good { background: var(--accent); }
  .score-warn { background: var(--warn); }
  .score-bad { background: var(--danger); }
  .tbl-actions { display: flex; gap: 6px; }
  .tbl-btn { padding: 5px 10px; font-family: var(--mono); font-size: 11px; border-radius: 6px; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border2); background: transparent; color: var(--muted); }
  .tbl-btn:hover { color: var(--text); border-color: var(--text); }
  .tbl-btn-del:hover { color: var(--danger); border-color: var(--danger); }
  .tbl-btn-check { background: var(--accent-light); color: var(--accent); border-color: var(--accent-light); }
  .tbl-btn-check:hover { background: var(--accent); color: white; }

  /* KEYWORDS */
  .kw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
  .kw-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 8px; transition: border-color 0.15s; }
  .kw-card:hover { border-color: var(--border2); }
  .kw-text { font-size: var(--fs-sm); font-weight: 400; flex: 1; }
  .kw-lang { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(--surface2); color: var(--muted); }
  .kw-del { font-family: var(--mono); font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
  .kw-del:hover { color: var(--danger); background: #fde8e8; }

  /* GSC */
  .gsc-connect { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 2.5rem; text-align: center; }
  .gsc-icon { font-size: 40px; margin-bottom: 1rem; }
  .gsc-title { font-size: 22px; font-weight: 600; margin-bottom: 0.5rem; }
  .gsc-sub { font-size: var(--fs-sm); color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
  .gsc-steps { text-align: left; background: var(--surface2); border-radius: var(--r); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
  .gsc-step { font-family: var(--mono); font-size: var(--fs-label); color: var(--muted); margin-bottom: 6px; display: flex; gap: 8px; }
  .gsc-step span { color: var(--accent); font-weight: 500; }
  .btn-gsc { padding: 13px 28px; background: var(--accent); color: white; border: none; border-radius: var(--r); font-family: var(--font); font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-gsc:hover { background: #144d30; box-shadow: 0 4px 16px rgba(26,92,58,0.25); }
  .gsc-table { width: 100%; border-collapse: collapse; }
  .gsc-table th { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); letter-spacing: 0.08em; text-transform: uppercase; }
  .gsc-table th.num { text-align: right; }
  .gsc-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: var(--fs-sm); }
  .gsc-table td.num { text-align: right; font-family: var(--mono); font-size: var(--fs-label); }
  .gsc-table tr:last-child td { border-bottom: none; }
  .gsc-table tr:hover td { background: var(--surface2); }
  .pos-chip { font-family: var(--mono); font-size: var(--fs-label); padding: 3px 9px; border-radius: 20px; display: inline-block; }
  .pos-top3 { background: var(--success-light); color: var(--success); }
  .pos-top10 { background: var(--warn-light); color: var(--warn); }
  .pos-other { background: var(--surface2); color: var(--muted); }
  .ctr-bar { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }

  /* ADD FORMS */
  .add-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .add-row input, .add-row select { flex: 1; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r); font-family: var(--font); font-size: var(--fs-sm); color: var(--text); outline: none; transition: border 0.2s; }
  .add-row input:focus, .add-row select:focus { border-color: var(--accent); }
  .add-row button { padding: 10px 18px; background: var(--accent); color: white; border: none; border-radius: var(--r); font-family: var(--font); font-size: var(--fs-sm); font-weight: 600; cursor: pointer; white-space: nowrap; }
  .add-row button:hover { background: #144d30; }

  .loading { text-align: center; padding: 3rem; font-family: var(--mono); font-size: var(--fs-sm); color: var(--muted); }
  .empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: var(--fs-sm); }
  .card-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; }

  @media (max-width: 768px) {
    main { padding: 1.5rem 1rem; }
    nav { padding: 1rem; }
    h1 { font-size: 28px; }
    .sites-table th:nth-child(3), .sites-table td:nth-child(3),
    .sites-table th:nth-child(4), .sites-table td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>
<nav>
  <div class="nav-logo">SEO-PM</div>
  <div class="nav-right">
    <a class="nav-back" href="dashboard.html">← Dashboard</a>
    <button class="nav-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<main id="main-content">
  <div class="loading">Loading project…</div>
</main>

<script src="config.js"></script>
<script>
if (sessionStorage.getItem('seopm_auth') !== 'true') location.href = 'index.html';

const { createClient } = supabase;
const db = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

const params = new URLSearchParams(location.search);
const projectId = params.get('id');
if (!projectId) location.href = 'dashboard.html';

let project = null, sites = [], keywords = [], gscData = [], pagespeedData = [];
let activeTab = 'sites';

async function loadAll() {
  const [{ data: p }, { data: w }, { data: k }, { data: g }, { data: ps }] = await Promise.all([
    db.from('projects').select('*').eq('id', projectId).single(),
    db.from('websites').select('*').eq('project_id', projectId).order('is_main', { ascending: false }),
    db.from('keywords').select('*').eq('project_id', projectId).order('lang'),
    db.from('gsc_data').select('*').eq('project_id', projectId).order('date', { ascending: false }),
    db.from('pagespeed_data').select('*').order('checked_at', { ascending: false })
  ]);
  project = p; sites = w||[]; keywords = k||[]; gscData = g||[]; pagespeedData = ps||[];
  renderPage();
}

function badgeClass(t) { return 'badge badge-'+t; }
function badgeLabel(t) { return t==='seo'?'SEO Client':t==='own'?'Own Project':'Startup'; }

function renderPage() {
  document.title = `SEO-PM · ${project.name}`;
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="proj-head">
      <div class="proj-badges">
        <span class="${badgeClass(project.type)}">${badgeLabel(project.type)}</span>
        ${project.location?`<span class="badge badge-loc">${project.location}</span>`:''}
        ${project.lang?`<span class="badge badge-loc">${project.lang}</span>`:''}
        ${project.client_name?`<span class="badge badge-loc">Client: ${project.client_name}</span>`:''}
      </div>
      <h1>${project.name}<br><em>${project.category||''}</em></h1>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('sites',this)">Websites (${sites.length})</button>
      <button class="tab" onclick="switchTab('keywords',this)">Keywords (${keywords.length})</button>
      <button class="tab" onclick="switchTab('pagespeed',this)">PageSpeed</button>
      <button class="tab" onclick="switchTab('gsc',this)">Search Console</button>
    </div>
    <div id="tab-sites" class="tab-content active">${renderSites()}</div>
    <div id="tab-keywords" class="tab-content">${renderKeywords()}</div>
    <div id="tab-pagespeed" class="tab-content">${renderPagespeed()}</div>
    <div id="tab-gsc" class="tab-content">${renderGSC()}</div>
  `;
}

function switchTab(name, el) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function renderSites() {
  return `<div class="section-head">
    <h2>Websites</h2>
    <button class="btn-sm" onclick="checkAllUptime()">Check all uptime</button>
  </div>
  <div class="add-row">
    <input id="new-site-url" placeholder="https://example.com" onkeydown="if(event.key==='Enter')addSite()">
    <button onclick="addSite()">+ Add site</button>
  </div>
  <div class="card-wrap">
    <table class="sites-table">
      <thead><tr>
        <th>URL</th>
        <th>Status</th>
        <th>PageSpeed</th>
        <th>Last checked</th>
        <th>Actions</th>
      </tr></thead>
      <tbody>
        ${sites.length ? sites.map(s => {
          const ps = pagespeedData.find(p=>p.website_id===s.id);
          const score = ps ? ps.performance_score : null;
          const scoreClass = score === null ? '' : score >= 90 ? 'score-good' : score >= 50 ? 'score-warn' : 'score-bad';
          const scoreHtml = score !== null ? `<div class="score-bar"><span class="score-num">${score}</span><div class="score-track"><div class="score-fill ${scoreClass}" style="width:${score}%"></div></div></div>` : '<span style="font-family:var(--mono);font-size:12px;color:var(--muted)">—</span>';
          const label = s.url.replace(/https?:\/\//,'').replace(/\/$/,'');
          const lastCheck = ps ? new Date(ps.checked_at).toLocaleDateString('en-GB') : '—';
          return `<tr>
            <td><a class="tbl-url" href="${s.url}" target="_blank">${label}${s.is_main?'<span class="main-badge">main</span>':''}</a></td>
            <td><span class="status-pill status-unknown" id="status-${s.id}">unknown</span></td>
            <td>${scoreHtml}</td>
            <td style="font-family:var(--mono);font-size:12px;color:var(--muted)">${lastCheck}</td>
            <td><div class="tbl-actions">
              <button class="tbl-btn tbl-btn-check" onclick="checkSite('${s.id}','${s.url}')">Check</button>
              <button class="tbl-btn tbl-btn-check" onclick="runPagespeed('${s.id}','${s.url}')">PSI</button>
              <button class="tbl-btn tbl-btn-del" onclick="deleteSite('${s.id}')">Del</button>
            </div></td>
          </tr>`;
        }).join('') : '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--muted);font-family:var(--mono);font-size:13px;">No websites yet. Add one above.</td></tr>'}
      </tbody>
    </table>
  </div>`;
}

function renderKeywords() {
  return `<div class="section-head">
    <h2>Keywords</h2>
    <span style="font-family:var(--mono);font-size:12px;color:var(--muted)">${keywords.length} total</span>
  </div>
  <div class="add-row">
    <input id="new-kw" placeholder="e.g. location autocar Bruxelles" onkeydown="if(event.key==='Enter')addKeyword()">
    <select id="new-kw-lang">
      <option value="FR">FR</option>
      <option value="EN">EN</option>
      <option value="NL">NL</option>
      <option value="AR">AR</option>
    </select>
    <button onclick="addKeyword()">+ Add keyword</button>
  </div>
  <div class="kw-grid">
    ${keywords.length ? keywords.map(k=>`
      <div class="kw-card">
        <span class="kw-text">${k.keyword}</span>
        <span class="kw-lang">${k.lang||'—'}</span>
        <button class="kw-del" onclick="deleteKeyword('${k.id}')">✕</button>
      </div>
    `).join('') : '<div class="empty">No keywords yet.</div>'}
  </div>`;
}

function renderPagespeed() {
  return `<div class="section-head">
    <h2>PageSpeed Insights</h2>
    <button class="btn-sm" onclick="runAllPagespeed()">Run all sites</button>
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.5rem;margin-bottom:1.5rem;">
    <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:8px;">API Key required — add PSI_API_KEY to config.js</div>
    <div style="font-size:14px;color:var(--muted);line-height:1.7;">Uses Google PageSpeed Insights API (free). Measures Performance, LCP, CLS, FID and TTFB for each website. Get your free API key at <a href="https://developers.google.com/speed/docs/insights/v5/get-started" target="_blank" style="color:var(--accent)">Google Developers Console</a>.</div>
  </div>
  <div class="card-wrap">
    <table class="sites-table">
      <thead><tr>
        <th>Website</th>
        <th>Score</th>
        <th>LCP</th>
        <th>CLS</th>
        <th>Device</th>
        <th>Checked</th>
      </tr></thead>
      <tbody>
        ${sites.map(s=>{
          const ps = pagespeedData.filter(p=>p.website_id===s.id);
          if (!ps.length) return `<tr><td style="font-family:var(--mono);font-size:12px;color:var(--accent)">${s.url.replace(/https?:\/\//,'').replace(/\/$/,'')}</td><td colspan="5" style="font-family:var(--mono);font-size:12px;color:var(--muted)">Not checked yet — click "Check" in the Websites tab</td></tr>`;
          return ps.map(p=>{
            const score = p.performance_score;
            const cls = p.cls ? (score>=90?'score-good':score>=50?'score-warn':'score-bad') : '';
            return `<tr>
              <td style="font-family:var(--mono);font-size:12px;color:var(--accent)">${s.url.replace(/https?:\/\//,'').replace(/\/$/,'')}</td>
              <td><div class="score-bar"><span class="score-num">${score||'—'}</span><div class="score-track"><div class="score-fill ${score>=90?'score-good':score>=50?'score-warn':'score-bad'}" style="width:${score||0}%"></div></div></div></td>
              <td style="font-family:var(--mono);font-size:12px">${p.lcp ? p.lcp+'s' : '—'}</td>
              <td style="font-family:var(--mono);font-size:12px">${p.cls !== null ? p.cls : '—'}</td>
              <td><span class="kw-lang">${p.device||'—'}</span></td>
              <td style="font-family:var(--mono);font-size:12px;color:var(--muted)">${new Date(p.checked_at).toLocaleDateString('en-GB')}</td>
            </tr>`;
          }).join('');
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderGSC() {
  if (!gscData.length) {
    return `<div class="gsc-connect">
      <div class="gsc-icon">📊</div>
      <div class="gsc-title">Connect Google Search Console</div>
      <div class="gsc-sub">Pull real keyword rankings, clicks, impressions and CTR directly from Google Search Console for <strong>${project.name}</strong>.</div>
      <div class="gsc-steps">
        <div class="gsc-step"><span>01</span> Go to Google Cloud Console → Create OAuth 2.0 Client ID</div>
        <div class="gsc-step"><span>02</span> Enable Search Console API for your project</div>
        <div class="gsc-step"><span>03</span> Add your GSC_CLIENT_ID to config.js</div>
        <div class="gsc-step"><span>04</span> Click Connect below → Authorize access</div>
      </div>
      <button class="btn-gsc" onclick="connectGSC()">Connect Google Search Console →</button>
    </div>`;
  }
  const latest = gscData.slice(0,50);
  return `<div class="section-head">
    <h2>Search Console Data</h2>
    <div style="display:flex;gap:8px;">
      <button class="btn-sm-outline" onclick="syncGSC()">Sync now</button>
      <button class="btn-sm" onclick="connectGSC()">Reconnect</button>
    </div>
  </div>
  <div class="card-wrap">
    <table class="gsc-table">
      <thead><tr>
        <th>Keyword</th>
        <th>Website</th>
        <th class="num">Position</th>
        <th class="num">Clicks</th>
        <th class="num">Impressions</th>
        <th class="num">CTR</th>
        <th>Date</th>
      </tr></thead>
      <tbody>
        ${latest.map(row=>{
          const pos = parseFloat(row.position);
          const posClass = pos<=3?'pos-top3':pos<=10?'pos-top10':'pos-other';
          return `<tr>
            <td>${row.keyword}</td>
            <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${row.website_url.replace(/https?:\/\//,'').replace(/\/$/,'')}</td>
            <td class="num"><span class="pos-chip ${posClass}">#${pos.toFixed(1)}</span></td>
            <td class="num">${row.clicks}</td>
            <td class="num">${row.impressions}</td>
            <td class="num">${row.ctr}%</td>
            <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${new Date(row.date).toLocaleDateString('en-GB')}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

/* ACTIONS */
async function addSite() {
  const url = document.getElementById('new-site-url').value.trim();
  if (!url || !url.startsWith('http')) { alert('Please enter a valid URL starting with https://'); return; }
  await db.from('websites').insert({ project_id: projectId, url, is_main: sites.length===0 });
  await loadAll();
}

async function deleteSite(id) {
  if (!confirm('Remove this website?')) return;
  await db.from('websites').delete().eq('id', id);
  await loadAll();
}

async function addKeyword() {
  const keyword = document.getElementById('new-kw').value.trim();
  const lang = document.getElementById('new-kw-lang').value;
  if (!keyword) return;
  await db.from('keywords').insert({ project_id: projectId, keyword, lang });
  document.getElementById('new-kw').value = '';
  await loadAll();
}

async function deleteKeyword(id) {
  await db.from('keywords').delete().eq('id', id);
  await loadAll();
}

async function checkSite(siteId, url) {
  const el = document.getElementById('status-'+siteId);
  if (el) { el.className='status-pill status-unknown'; el.textContent='checking…'; }
  try {
    const start = Date.now();
    await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
    const ms = Date.now() - start;
    await db.from('uptime_logs').insert({ website_id: siteId, status: 'up', response_time_ms: ms });
    if (el) { el.className='status-pill status-up'; el.textContent='online'; }
  } catch {
    await db.from('uptime_logs').insert({ website_id: siteId, status: 'down' });
    if (el) { el.className='status-pill status-down'; el.textContent='offline'; }
  }
}

async function checkAllUptime() {
  for (const s of sites) await checkSite(s.id, s.url);
}

async function runPagespeed(siteId, url) {
  if (!CONFIG.PSI_API_KEY || CONFIG.PSI_API_KEY === 'YOUR_PSI_API_KEY') {
    alert('Add your PSI_API_KEY to config.js first.\nGet it free at: https://developers.google.com/speed/docs/insights/v5/get-started');
    return;
  }
  alert('Running PageSpeed for ' + url + '…');
  try {
    const r = await fetch(`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&key=${CONFIG.PSI_API_KEY}&strategy=mobile`);
    const data = await r.json();
    const cats = data.lighthouseResult?.categories;
    const audits = data.lighthouseResult?.audits;
    if (cats) {
      await db.from('pagespeed_data').insert({
        website_id: siteId,
        performance_score: Math.round((cats.performance?.score||0)*100),
        lcp: audits?.['largest-contentful-paint']?.numericValue ? (audits['largest-contentful-paint'].numericValue/1000).toFixed(2) : null,
        cls: audits?.['cumulative-layout-shift']?.numericValue?.toFixed(3) || null,
        fid: audits?.['total-blocking-time']?.numericValue?.toFixed(0) || null,
        ttfb: audits?.['server-response-time']?.numericValue ? (audits['server-response-time'].numericValue/1000).toFixed(2) : null,
        device: 'mobile'
      });
      await loadAll();
    }
  } catch(e) { alert('PageSpeed check failed: ' + e.message); }
}

async function runAllPagespeed() {
  for (const s of sites) await runPagespeed(s.id, s.url);
}

function connectGSC() {
  if (!CONFIG.GSC_CLIENT_ID || CONFIG.GSC_CLIENT_ID==='YOUR_GSC_CLIENT_ID') {
    alert('Add your GSC_CLIENT_ID to config.js first.\n\nSteps:\n1. Go to https://console.cloud.google.com\n2. Create OAuth 2.0 Client ID\n3. Enable Search Console API\n4. Add Client ID to config.js');
    return;
  }
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CONFIG.GSC_CLIENT_ID}&redirect_uri=${encodeURIComponent(location.origin+'/gsc-callback.html')}&response_type=token&scope=https://www.googleapis.com/auth/webmasters.readonly&access_type=online`;
  window.open(authUrl, '_blank', 'width=500,height=600');
}

async function syncGSC() { alert('GSC sync: Re-connect to refresh data.'); }
function logout() { sessionStorage.removeItem('seopm_auth'); location.href='index.html'; }

loadAll();
</script>
