<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO-PM · Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #081221;
    --surface: #0f1b2e;
    --surface2: #1d2839;
    --border: #26344a;
    --border2: #3a4d66;
    --text: #f8fafc;
    --muted: #97a3b4;
    --accent: #00bfff;
    --accent-dark: #081221;
    --danger: #ef4444;
    --r: 8px; --rl: 12px;
    --font: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(0,191,255,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(0,191,255,0.04) 0%, transparent 50%); pointer-events: none; }
  .box { width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 3rem 2.5rem; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .logo-text { font-size: 14px; font-weight: 600; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; }
  h1 { font-size: 30px; font-weight: 700; line-height: 1.2; margin-bottom: 0.5rem; }
  .sub { font-size: 16px; color: var(--muted); margin-bottom: 2.5rem; }
  label { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; display: block; margin-bottom: 8px; }
  input[type=password] { width: 100%; padding: 14px 16px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); font-family: var(--font); font-size: 16px; color: var(--text); outline: none; transition: border 0.2s, box-shadow 0.2s; margin-bottom: 1.25rem; letter-spacing: 0.08em; }
  input[type=password]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,191,255,0.12); }
  button { width: 100%; padding: 14px; background: var(--accent); color: var(--accent-dark); border: none; border-radius: var(--r); font-family: var(--font); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em; }
  button:hover { background: #1ad4ff; box-shadow: 0 4px 20px rgba(0,191,255,0.3); transform: translateY(-1px); }
  .err { font-size: 14px; color: var(--danger); margin-top: 0.75rem; display: none; text-align: center; }
  .footer { margin-top: 2rem; text-align: center; font-size: 13px; color: var(--muted); }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="box">
  <div class="logo"><span class="logo-dot"></span><span class="logo-text">SEO-PM v1.0</span></div>
  <h1>Welcome back</h1>
  <p class="sub">Abdelkrim Aridhi · Project Dashboard</p>
  <label for="pwd">Password</label>
  <input type="password" id="pwd" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">Sign in →</button>
  <div class="err" id="err">Incorrect password. Try again.</div>
  <div class="footer"><a href="https://rankwise.eu" target="_blank">rankwise.eu</a> · <a href="https://mypages.agency" target="_blank">mypages.agency</a></div>
</div>
<script src="config.js"></script>
<script>
  if (sessionStorage.getItem('seopm_auth') === 'true') location.href = 'dashboard.html';
  function login() {
    const val = document.getElementById('pwd').value;
    if (val === CONFIG.APP_PASSWORD) {
      sessionStorage.setItem('seopm_auth', 'true');
      location.href = 'dashboard.html';
    } else {
      document.getElementById('err').style.display = 'block';
      document.getElementById('pwd').style.borderColor = '#ef4444';
    }
  }
</script>
</body>
</html>
